name: Stale Issue & PR Management

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 09:00 UTC
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: |
            This issue has been inactive for 14 days. 
            It will be closed in 7 days unless there is new activity.
            — Wanda (Automated)
          stale-pr-message: |
            This PR has been inactive for 14 days.
            It will be closed in 7 days unless there is new activity.
            — Wanda (Automated)
          close-issue-message: |
            Closing due to inactivity. Feel free to reopen if still relevant.
            — Wanda (Automated)
          days-before-stale: 14
          days-before-close: 7
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,in-progress'
